project:
  name: "MertNet-S Stable ImageNet-1K Training"
  seed: 42

data:
  train_csv: "data_splits/stable_imagenet_train.csv"
  val_csv: "data_splits/stable_imagenet_val.csv"
  input_size: 160
  num_classes: 1000
  num_workers: 2

model:
  name: "MertNet-S"
  dropout: 0.3
  feature_dim: 384

training:
  epochs: 30
  batch_size: 32
  optimizer: "AdamW"
  learning_rate: 0.001
  weight_decay: 0.0001
  loss_function: "CrossEntropyLoss"
  early_stopping_patience: 7

augmentation:
  train:
    random_resized_crop: 160
    horizontal_flip: 0.5
    color_jitter: true
  validation:
    resize: 176
    center_crop: 160

normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

outputs:
  results_dir: "results/stable_imagenet"
  model_dir: "exported_model"
  best_model_name: "mertnet_s_best.pth"
  last_model_name: "mertnet_s_last.pth"